<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--CSS LINK-->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container" id="first-page">
        <h1>Welcome to ChatApplication</h1>
        <form>
            <p>Please insert your name</p>
            <input name="name" id="name-input" type="text">
            <button id="submit-name">Submit</button>
        </form>
    </div>

    <div id="chat-page" style="display: none;">
        <div class="chat-card">
            <div class="chat-header">
                <div class="avatar">A</div>
                <div class="header-info">
                    <div class="name" id="name-display">ChatApplication</div>
                </div>
            </div>

            <div class="messages" id="message-display">

            </div>

            <div class="composer">
                <form id="send-message-form">
                    <input type="text" name="message" id="message-from-user" placeholder="Type a message here">
                    <button class="send">➤</button>
                </form>
            </div>
        </div>
    </div>




    <script src="script.js"></script>
</body>

</html>
